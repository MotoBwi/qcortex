# Qcortex Workflow Security Dependency Upgrade

## Action

Follow the security-dependency-upgrade workflow:
1. Detect vulnerability in a dependency (e.g., via Snyk/Dependabot).
2. Update the affected dependency version in package.json or equivalent manifest.
3. Commit the change with a message referencing the vulnerability or upgrade.
4. Optionally, merge an automated pull request.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: package.json, extensions/zalo/package.json

